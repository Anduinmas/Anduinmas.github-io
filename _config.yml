# ==================== 网站基本信息 ====================
title: 一隅小记
subtitle: '记录技术与生活的角落'
description: '一个打工人的博客，分享编程、读书与日常'
keywords: '博客,技术,生活,读书,前端,职场'
author: 一隅
language: zh-CN
timezone: 'Asia/Shanghai'

# ==================== 网址（部署后修改为你的域名） ====================
url: https://anduinmas.top
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# ==================== 目录配置 ====================
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code

# ==================== 文章配置 ====================
new_post_name: :title.md
default_layout: post
default_category: uncategorized
titlecase: false
filename_case: 0
render_drafts: false
post_asset_folder: false
future: true

# ==================== 首页分页 ====================
index_generator:
  path: ''
  per_page: 10
  order_by: -date

per_page: 10
pagination_dir: page

# ==================== 代码高亮 ====================
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true

# ==================== 日期格式 ====================
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# ==================== 主题 ====================
theme: butterfly

# ==================== 搜索（hexo-generator-searchdb） ====================
search:
  path: search.xml
  field: post
  content: true
  format: html

# ==================== RSS（hexo-generator-feed） ====================
feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true
  order_by: -date
  icon: /images/favicon-32x32.png

# ==================== 站点地图（SEO） ====================
sitemap:
  path: sitemap.xml

baidusitemap:
  path: baidusitemap.xml

# ==================== PWA ====================
pwa:
  manifest:
    path: /manifest.json
    body: |
      {
        "name": "一隅小记",
        "short_name": "一隅",
        "theme_color": "#7D9D7E",
        "background_color": "#FAFAF5",
        "display": "standalone",
        "start_url": "/",
        "icons": []
      }

# ==================== 部署（稍后填入你的 GitHub 用户名） ====================
deploy:
  type: git
  repo: git@github.com:Anduinmas/Anduinmas.github-io.git
  branch: main
