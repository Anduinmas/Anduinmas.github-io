name: 自动部署博客

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci

      - name: 生成静态文件
        run: npx hexo generate

      - name: 部署到 main 分支
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push -f "https://${{ secrets.GITHUB_TOKEN }}@github.com/Anduinmas/Anduinmas.github-io.git" HEAD:main
