<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一隅小记 · 管理后台</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #edf2f7; }
    .error-box {
      display: none;
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border-left: 4px solid #e53e3e;
      border-radius: 8px;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="error" class="error-box"></div>
  <script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.10.192/dist/netlify-cms.js"></script>
  <script>
    // Show error if CMS fails to load
    setTimeout(function() {
      var root = document.getElementById('nc-root');
      if (!root || root.children.length === 0) {
        var err = document.getElementById('error');
        var msg = 'CMS 未能加载。\n\n可能原因:\n1. config.yml 格式错误\n2. CDN 脚本加载失败\n3. 浏览器兼容性问题\n\n请打开 Console（F12）查看详细报错。';
        err.textContent = msg;
        err.style.display = 'block';
      }
    }, 5000);
  </script>
</body>
</html>
