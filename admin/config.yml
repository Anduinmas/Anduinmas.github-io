backend:
  name: github
  repo: Anduinmas/Anduinmas.github-io
  branch: source
  base_url: https://anduinmas-github-io-yi9u.vercel.app
  squash_merges: true

media_folder: "source/images"
public_folder: "/images"
site_url: https://anduinmas.top
display_url: https://anduinmas.top

locale: zh_Hans

collections:
  - name: "posts"
    label: "文章"
    folder: "source/_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "日期"
        name: "date"
        widget: "datetime"
      - label: "分类"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - "技术"
          - "生活"
          - "读书"
          - "职场"
      - label: "标签"
        name: "tags"
        widget: "list"
        default:
          - "随笔"
      - label: "摘要"
        name: "description"
        widget: "string"
        required: false
      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false
      - label: "置顶"
        name: "sticky"
        widget: "number"
        default: 0
        value_type: "int"
      - label: "正文"
        name: "body"
        widget: "markdown"
